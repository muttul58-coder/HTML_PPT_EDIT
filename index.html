<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>HTML PPT Editor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI','Malgun Gothic',sans-serif;background:#1a1d24;color:#e8eaf2;font-size:13px;}
button{font-family:inherit;font-size:12px;}

/* 레이아웃 */
#app{display:grid;grid-template-rows:48px 1fr;grid-template-columns:220px 1fr 280px;height:100vh;}
#topbar{grid-column:1/4;background:#0f1116;border-bottom:1px solid #262932;display:flex;align-items:center;padding:0 14px;gap:8px;}
#left{background:#13161d;border-right:1px solid #262932;overflow-y:auto;}
#center{background:#06080c;overflow:auto;position:relative;display:flex;align-items:center;justify-content:center;}
#right{background:#13161d;border-left:1px solid #262932;overflow-y:auto;overflow-x:hidden;padding:12px;min-width:0;}

/* 툴바 */
.tb-btn{background:#262932;color:#e8eaf2;border:1px solid #353945;border-radius:5px;padding:6px 12px;cursor:pointer;text-decoration:none;display:inline-block;font-size:13px;}
.tb-btn:hover{background:#353945;}
.tb-btn:disabled{opacity:.4;cursor:not-allowed;}
.tb-btn.primary{background:#00a37a;border-color:#00a37a;}
.tb-btn.primary:hover{background:#00b88c;}
.tb-btn.danger{background:#7a2828;border-color:#a13030;}
.tb-sep{width:1px;height:24px;background:#262932;margin:0 4px;}
.tb-label{color:#8a8f9a;font-size:11px;letter-spacing:1px;}
#title{font-weight:700;letter-spacing:1px;color:#00d4a0;margin-right:12px;}

/* 슬라이드 패널 */
.sp-head{padding:10px 12px;color:#8a8f9a;font-size:10px;letter-spacing:2px;font-weight:700;}
.thumb{margin:6px 10px;background:#1c1f28;border:1px solid #262932;border-radius:6px;padding:8px 10px;cursor:pointer;display:flex;align-items:center;gap:8px;}
.thumb:hover{border-color:#00d4a0;}
.thumb.active{background:#003a2c;border-color:#00d4a0;}
.thumb.dragging{opacity:.4;}
.thumb.drop-before{border-top:2px solid #00d4a0;}
.thumb.drop-after{border-bottom:2px solid #00d4a0;}
.thumb-handle{font-size:14px;color:#5a6070;cursor:grab;user-select:none;}
.thumb-handle:active{cursor:grabbing;}
.thumb-num{font-family:monospace;font-size:11px;color:#8a8f9a;width:20px;}
.thumb-title{font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.thumb-del{opacity:.4;cursor:pointer;font-size:12px;}
.thumb-del:hover{opacity:1;color:#ef4444;}

/* 캔버스 */
#canvas-wrap{position:relative;}
#frame{width:1280px;height:800px;border:none;background:#000;display:block;box-shadow:0 0 80px rgba(0,0,0,0.6);}
#overlay{position:absolute;top:0;left:0;width:1280px;height:800px;pointer-events:none;}
.sel-box{position:absolute;border:2px solid #00d4a0;pointer-events:none;}
.handle{position:absolute;width:10px;height:10px;background:#fff;border:2px solid #00d4a0;border-radius:2px;pointer-events:auto;cursor:pointer;z-index:10;}
.handle.h-nw{cursor:nwse-resize;} .handle.h-ne{cursor:nesw-resize;}
.handle.h-sw{cursor:nesw-resize;} .handle.h-se{cursor:nwse-resize;}
.handle.h-n{cursor:ns-resize;}    .handle.h-s{cursor:ns-resize;}
.handle.h-w{cursor:ew-resize;}    .handle.h-e{cursor:ew-resize;}

/* 우측 속성 패널 */
.ph{font-size:10px;letter-spacing:2px;font-weight:700;color:#8a8f9a;margin:14px 0 6px;}
.ph:first-child{margin-top:0;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px;}
.row-lh{display:grid;grid-template-columns:60px 60px 1fr;gap:6px;margin-bottom:6px;}
.field{display:flex;flex-direction:column;gap:3px;min-width:0;}
.field label{font-size:10px;color:#6b7280;}
.field input,.field select,.field textarea{
  background:#1c1f28;border:1px solid #2a2f3a;color:#e8eaf2;padding:5px 7px;border-radius:4px;font-size:12px;font-family:inherit;
  width:100%;min-width:0;max-width:100%;box-sizing:border-box;
}
.field input[type="color"]{padding:2px;height:28px;}
.field textarea{max-width:100%;}
.field input:focus,.field textarea:focus{outline:none;border-color:#00d4a0;}
.field textarea{resize:vertical;min-height:60px;font-family:'Consolas',monospace;font-size:11px;}
.row-btns{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.row-nudge{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin:-2px 0 6px;}
.nudge{background:#1f232c;color:#e8eaf2;border:1px solid #353945;border-radius:4px;padding:4px 0;cursor:pointer;font-size:13px;line-height:1;}
.nudge:hover{background:#2a2f39;border-color:#00d4a0;}
.nudge:active{background:#00d4a0;color:#0d1018;}
.mini-btn{background:#262932;color:#e8eaf2;border:1px solid #353945;border-radius:4px;padding:4px 8px;cursor:pointer;font-size:11px;}
.mini-btn:hover{background:#353945;}
.mini-btn.danger{border-color:#a13030;}
.mini-btn.danger:hover{background:#7a2828;}

#empty-msg{color:#6b7280;font-size:12px;text-align:center;padding:30px 12px;line-height:1.6;}
#crumbs{font-size:10px;color:#6b7280;font-family:monospace;margin-bottom:8px;line-height:1.4;word-break:break-all;}
#crumbs span{cursor:pointer;}
#crumbs span:hover{color:#00d4a0;}

#status{position:fixed;bottom:10px;left:230px;background:rgba(0,0,0,0.8);padding:6px 12px;border-radius:4px;font-size:11px;color:#00d4a0;display:none;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span id="title">HTML PPT EDITOR</span>
    <button class="tb-btn" id="btn-open">파일 열기</button>
    <span id="current-file" title="클릭해서 파일명 편집" style="color:#8a8f9a; font-size:11px; margin-left:8px; cursor:pointer; padding:2px 6px; border-radius:3px;"></span>
    <input type="file" id="file-input" accept=".html,.htm" style="display:none;">
    <span class="tb-sep"></span>
    <button class="tb-btn primary" id="btn-save">HTML 내보내기</button>
    <span class="tb-sep"></span>
    <button class="tb-btn" id="btn-undo">↶ Undo</button>
    <button class="tb-btn" id="btn-redo">↷ Redo</button>
    <span class="tb-sep"></span>
    <button class="tb-btn" id="btn-add-slide">+ 슬라이드 추가</button>
    <button class="tb-btn" id="btn-dup-slide">슬라이드 복제</button>
    <span class="tb-sep"></span>
    <a class="tb-btn" id="btn-prompt" href="ppt_prompt_template.md" download title="새 PPT 생성용 프롬프트 템플릿 다운로드 (.md)">📄 프롬프트 템플릿</a>
    <span style="flex:1;"></span>
    <span class="tb-label" id="hint">클릭 선택 · 방향키 이동(Shift=10px) · Alt+방향키 크기 변경 · DEL 삭제 · Ctrl+D 복제 · Ctrl+C/V 복사·붙여넣기 · ESC 해제</span>
  </div>
  <div id="left">
    <div class="sp-head">SLIDES</div>
    <div id="slide-list"></div>
  </div>
  <div id="center">
    <div id="canvas-wrap">
      <iframe id="frame"></iframe>
      <div id="overlay"></div>
    </div>
  </div>
  <div id="right">
    <div id="props"><div id="empty-msg">선택된 요소가 없습니다.<br><br>가운데 슬라이드의 아무 요소나<br>클릭하여 편집을 시작하세요.</div></div>
  </div>
</div>
<div id="status"></div>

<script>
'use strict';

// ============ State ============
const state = {
  doc: null,           // parsed Document of the loaded HTML
  slideEls: [],        // <div class="slide"> elements in order
  curSlide: 0,
  selected: null,      // currently selected element inside iframe
  history: [],
  historyIdx: -1,
  fileName: 'edited.html',
  loadedByUser: false, // tracks if user loaded a file manually
  iframeReady: false,  // true once iframe srcdoc reflects current state.doc
  iframeDoc: null,     // which state.doc instance the iframe currently reflects
  iframeIdx: -1,       // which slide index the iframe currently shows
  savedHistoryIdx: 0,  // history index at last export — anything after = unsaved
};
function isDirty(){ return state.history.length > 0 && state.historyIdx > state.savedHistoryIdx; }

const AUTOSAVE_KEY = 'html_ppt_editor_autosave_v1';
function autosave(){
  clearTimeout(autosave._t);
  autosave._t = setTimeout(() => {
    try {
      if(!state.doc) return;
      const html = '<!DOCTYPE html>\n' + state.doc.documentElement.outerHTML;
      localStorage.setItem(AUTOSAVE_KEY, JSON.stringify({
        html, fileName: state.fileName, slide: state.curSlide, time: Date.now()
      }));
    } catch(e){ console.warn('autosave failed:', e.message); }
  }, 800);
}
function clearAutosave(){
  try { localStorage.removeItem(AUTOSAVE_KEY); } catch(e){}
}
function readAutosave(){
  try { return JSON.parse(localStorage.getItem(AUTOSAVE_KEY) || 'null'); } catch(e){ return null; }
}
function updateHistoryButtons(){
  const u = $('btn-undo'), r = $('btn-redo');
  if(u) u.disabled = state.historyIdx <= 0;
  if(r) r.disabled = state.historyIdx >= state.history.length-1;
}

// ============ Utilities ============
const $ = id => document.getElementById(id);
function showStatus(msg, ms=1500){
  const s=$('status'); s.textContent=msg; s.style.display='block';
  clearTimeout(showStatus._t);
  showStatus._t=setTimeout(()=>s.style.display='none',ms);
}

// ============ History ============
function snapshot(){
  if(!state.doc) return;
  // Sync iframe edits back to state.doc before snapshotting
  syncIframeToDoc();
  const html = '<!DOCTYPE html>\n' + state.doc.documentElement.outerHTML;
  // truncate forward history
  state.history = state.history.slice(0, state.historyIdx+1);
  state.history.push({html, slide: state.curSlide});
  if(state.history.length > 50){ state.history.shift(); state.savedHistoryIdx--; }
  state.historyIdx = state.history.length - 1;
  updateHistoryButtons();
  if(isDirty()) autosave();
}
function undo(){
  if(state.historyIdx <= 0) return;
  state.historyIdx--;
  restoreSnapshot(state.history[state.historyIdx]);
  updateHistoryButtons();
}
function redo(){
  if(state.historyIdx >= state.history.length-1) return;
  state.historyIdx++;
  restoreSnapshot(state.history[state.historyIdx]);
  updateHistoryButtons();
}
function restoreSnapshot(snap){
  loadHTML(snap.html, false);
  setTimeout(()=>showSlide(snap.slide), 50);
}

// ============ Loading ============
async function loadDefault(force){
  if(!force && state.loadedByUser) return;
  // 자동 저장본 복구 제안
  const auto = readAutosave();
  if(!force && auto && auto.html){
    const mins = Math.round((Date.now()-auto.time)/60000);
    const when = mins < 1 ? '방금 전' : (mins < 60 ? `${mins}분 전` : `${Math.round(mins/60)}시간 전`);
    if(confirm(`자동 저장된 편집 내용이 있습니다 (${when}, ${auto.fileName||'unknown'}).\n복구하시겠습니까?\n\n[취소]를 누르면 원본 파일을 새로 로드합니다.`)){
      state.fileName = auto.fileName || 'recovered.html';
      loadHTML(auto.html, true);
      setTimeout(()=>{ if(auto.slide!=null) showSlide(auto.slide); }, 100);
      showStatus('자동 저장본 복구됨', 2500);
      return;
    } else {
      clearAutosave();
    }
  }
  try {
    // data/ 디렉토리에서 첫 .html 파일을 자동 선택 (editor_manual.html은 제외)
    const idx = await fetch('data/');
    if(!idx.ok) throw new Error('data/ index fetch failed');
    const idxHTML = await idx.text();
    const links = Array.from(idxHTML.matchAll(/href="([^"]+\.html?)"/gi)).map(m => m[1]);
    const candidate = links.find(n => !/editor_manual/i.test(n));
    if(!candidate) throw new Error('no html in data/');
    const res = await fetch('data/' + candidate);
    if(!res.ok) throw new Error('fetch failed: ' + candidate);
    const html = await res.text();
    state.loadedByUser = false;
    state.fileName = candidate.replace(/\.html?$/i,'').replace(/(_edited)+$/,'') + '_edited.html';
    loadHTML(html, true);
  } catch(e){
    console.warn('loadDefault fallback:', e.message);
    // Fallback: create visible default slide
    const defaultHTML = `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>New PPT</title>
<style>
.slide{display:none;width:1280px;height:800px;background:#0b0e17;color:#e8eaf2;font-family:'Segoe UI','Malgun Gothic',sans-serif;position:absolute;top:0;left:0;}
.slide.active{display:flex;align-items:center;justify-content:center;font-size:48px;}
</style>
</head><body>
<div class="slide active">새 PPT 문서</div>
</body></html>`;
    state.fileName = 'new_ppt.html';
    loadHTML(defaultHTML, true);
  }
}

function loadFromFile(file){
  const reader = new FileReader();
  reader.onload = e => {
    showStatus('파일 로드 완료: ' + file.name);
    state.fileName = file.name.replace(/\.html?$/i,'').replace(/(_edited)+$/,'') + '_edited.html';
    state.loadedByUser = true;
    loadHTML(e.target.result, true);
  };
  reader.onerror = () => {
    showStatus('파일 읽기 실패: ' + reader.error, 3000);
  };
  reader.readAsText(file, 'UTF-8');
}

function loadHTML(html, resetHistory){
  try {
    const parser = new DOMParser();
    const newDoc = parser.parseFromString(html, 'text/html');
    const newSlides = Array.from(newDoc.querySelectorAll('.slide'));
    if(newSlides.length === 0){
      showStatus('.slide 클래스 요소 없음 - 로드 취소', 3000);
      return;
    }
    showStatus('슬라이드 ' + newSlides.length + '장 로드됨', 2000);
    state.doc = newDoc;
    state.slideEls = newSlides;
    // Disable original navigation script — we don't want the original deck JS to run during editing
    state.doc.querySelectorAll('script').forEach(s => s.remove());

    state.curSlide = 0;
    state.selected = null;
    if(resetHistory){ state.history=[]; state.historyIdx=-1; snapshot(); state.savedHistoryIdx=state.historyIdx; }
    renderFrame();
    renderSlideList();
    renderProps();
    // Update current file display
    const cf = $('current-file');
    if(cf) cf.textContent = '현재: ' + state.fileName;
  } catch(e) {
    showStatus('로드 오류: ' + e.message, 5000);
    console.error('loadHTML error:', e);
  }
}

// ============ Rendering iframe ============
function buildFrameHTML(activeIdx){
  // Clone doc, then make only one slide active and disable transitions/animations
  const clone = state.doc.cloneNode(true);
  const slides = clone.querySelectorAll('.slide');
  slides.forEach((s,i) => {
    s.classList.remove('active','ai','ao','air','aor');
    s.style.display = (i===activeIdx) ? 'flex' : 'none';
    if(i===activeIdx) s.classList.add('active');
  });
  // inject editor styles to neutralize scaling and transform
  const style = clone.createElement('style');
  style.textContent = `
    html,body{overflow:hidden!important;}
    #scale-wrap{transform:none!important;margin:0!important;}
    #ctrl,#kbh{display:none!important;}
    .slide.ai,.slide.ao,.slide.air,.slide.aor{animation:none!important;}
    [data-edit-hover]:not([data-edit-selected]){outline:1px dashed #00d4a0;outline-offset:-1px;}
  `;
  clone.head.appendChild(style);
  return '<!DOCTYPE html>\n' + clone.documentElement.outerHTML;
}

function renderFrame(){
  state.iframeReady = false;
  state.iframeDoc = null;
  state.iframeIdx = -1;
  const builtForDoc = state.doc;
  const builtForIdx = state.curSlide;
  const html = buildFrameHTML(builtForIdx);
  const f = $('frame');
  f.srcdoc = html;
  f.onload = () => {
    wireIframe();
    fitCanvas();
    state.iframeDoc = builtForDoc;
    state.iframeIdx = builtForIdx;
    state.iframeReady = true;
  };
}

function wireIframe(){
  const fdoc = $('frame').contentDocument;
  if(!fdoc) return;

  // hover outline
  fdoc.body.addEventListener('mouseover', e => {
    const el = e.target;
    if(!el || el===fdoc.body || el===fdoc.documentElement) return;
    if(getSlideRoot(el)) el.setAttribute('data-edit-hover','');
  });
  fdoc.body.addEventListener('mouseout', e => {
    if(e.target.removeAttribute) e.target.removeAttribute('data-edit-hover');
  });
  fdoc.body.addEventListener('click', e => {
    e.preventDefault(); e.stopPropagation();
    const el = e.target;
    const root = getSlideRoot(el);
    if(!root) return;
    if(el === root) { selectElement(root); return; }
    selectElement(el);
  }, true);
  fdoc.body.addEventListener('dblclick', e => {
    const el = e.target;
    if(!el || !getSlideRoot(el)) return;
    e.preventDefault(); e.stopPropagation();
    startInlineEdit(el, e);
  }, true);

  // start drag on selected element
  fdoc.body.addEventListener('mousedown', e => {
    if(!state.selected) return;
    if(e.target !== state.selected && !state.selected.contains(e.target)) return;
    // don't start drag on a content-editable
    if(e.target.isContentEditable) return;
    e.preventDefault();
    startDragMove(e);
  }, true);

  // keyboard inside iframe
  fdoc.addEventListener('keydown', handleKeydown);
  fdoc.addEventListener('keyup', handleAltKeyup);
}

function getSlideRoot(el){
  let n = el;
  while(n && n.classList){
    if(n.classList.contains('slide')) return n;
    n = n.parentElement;
  }
  return null;
}

// 슬라이드의 대표 제목을 추측한다.
// 1) 흔한 제목 클래스/태그 우선 → 2) 슬라이드 내 가장 큰 font-size 텍스트 → 3) 최초 비어있지 않은 텍스트
function extractSlideTitle(slide){
  const sel = '.sh, .ch, .kicker, .title, .slide-title, .heading, h1, h2, h3';
  const headed = slide.querySelector(sel);
  if(headed && headed.textContent.trim()) return headed.textContent;
  // font-size 기반 추정
  let best = null, bestSize = 0;
  slide.querySelectorAll('*').forEach(el => {
    if(!el.children.length || [...el.children].every(c => c.children.length===0)){
      const txt = el.textContent.trim();
      if(!txt || txt.length>80) return;
      const m = (el.getAttribute('style')||'').match(/font-size\s*:\s*(\d+(?:\.\d+)?)px/i);
      const size = m ? parseFloat(m[1]) : 0;
      if(size > bestSize){ bestSize = size; best = txt; }
    }
  });
  if(best && bestSize >= 18) return best;
  // 마지막 fallback: 첫 짧은 텍스트
  for(const el of slide.querySelectorAll('*')){
    const txt = el.textContent.trim();
    if(txt && txt.length<=60 && el.children.length===0) return txt;
  }
  return '';
}

// ============ Slide list ============
function renderSlideList(){
  const list = $('slide-list');
  list.innerHTML = '';
  state.slideEls.forEach((s, i) => {
    const t = document.createElement('div');
    t.className = 'thumb' + (i===state.curSlide?' active':'');
    t.draggable = true;
    t.dataset.idx = i;
    const title = (extractSlideTitle(s) || s.id || ('Slide '+(i+1))).trim().slice(0,30);
    t.innerHTML = `<span class="thumb-handle" title="드래그하여 순서 변경">⋮⋮</span><span class="thumb-num">${String(i+1).padStart(2,'0')}</span><span class="thumb-title">${escapeHTML(title)}</span><span class="thumb-del" title="삭제">✕</span>`;
    t.querySelector('.thumb-title').onclick = () => showSlide(i);
    t.querySelector('.thumb-num').onclick = () => showSlide(i);
    t.querySelector('.thumb-del').onclick = (e) => { e.stopPropagation(); deleteSlide(i); };
    // drag-and-drop reorder
    t.addEventListener('dragstart', e => {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(i));
      t.classList.add('dragging');
    });
    t.addEventListener('dragend', () => {
      t.classList.remove('dragging');
      list.querySelectorAll('.thumb').forEach(n => n.classList.remove('drop-before','drop-after'));
    });
    t.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const r = t.getBoundingClientRect();
      const before = (e.clientY - r.top) < r.height/2;
      list.querySelectorAll('.thumb').forEach(n => n.classList.remove('drop-before','drop-after'));
      t.classList.add(before?'drop-before':'drop-after');
    });
    t.addEventListener('drop', e => {
      e.preventDefault();
      const from = parseInt(e.dataTransfer.getData('text/plain'));
      if(isNaN(from) || from===i) return;
      const r = t.getBoundingClientRect();
      const before = (e.clientY - r.top) < r.height/2;
      let to = before ? i : i+1;
      reorderSlide(from, to);
    });
    list.appendChild(t);
  });
}

function reorderSlide(from, to){
  if(from<0 || from>=state.slideEls.length) return;
  if(to<0 || to>state.slideEls.length) return;
  if(to===from || to===from+1) return; // no-op
  syncIframeToDoc();
  const moving = state.slideEls[from];
  // 삽입 기준점: 드래그한 슬라이드를 제거한 후의 새 위치
  const refIdx = (to > from) ? to : to;
  const parent = moving.parentNode;
  // 안전한 배열-기반 재정렬
  const arr = state.slideEls.slice();
  const [m] = arr.splice(from, 1);
  const insertIdx = (to > from) ? (to - 1) : to;
  arr.splice(insertIdx, 0, m);
  // DOM에 다시 붙이기 — 같은 부모 안에서 순서 변경
  arr.forEach(s => parent.appendChild(s));
  state.slideEls = Array.from(state.doc.querySelectorAll('.slide'));
  // 현재 보던 슬라이드 인덱스를 추적
  const newCur = state.slideEls.indexOf(state.slideEls.find(s => s === moving) || state.slideEls[insertIdx]);
  if(state.curSlide === from) state.curSlide = insertIdx;
  else if(from < state.curSlide && insertIdx >= state.curSlide) state.curSlide--;
  else if(from > state.curSlide && insertIdx <= state.curSlide) state.curSlide++;
  snapshot();
  renderFrame();
  renderSlideList();
}

function showSlide(i){
  if(i<0 || i>=state.slideEls.length) return;
  // sync edits from current iframe slide back to state.doc before switching
  syncIframeToDoc();
  state.curSlide = i;
  state.selected = null;
  renderFrame();
  renderSlideList();
  renderProps();
}

// Copy current iframe's slide DOM back into state.doc's corresponding slide.
// This is essential because iframe is built from a srcdoc snapshot of state.doc,
// so user edits live only inside the iframe until we sync them back.
function syncIframeToDoc(){
  if(!state.iframeReady) return;
  // iframe must currently reflect the SAME state.doc instance we're about to write to
  if(state.iframeDoc !== state.doc) return;
  const idx = state.iframeIdx;
  if(idx < 0) return;
  const f = $('frame'); if(!f) return;
  const fdoc = f.contentDocument; if(!fdoc) return;
  const docSlide = state.slideEls[idx];
  if(!docSlide) return;
  const iframeSlides = fdoc.querySelectorAll('.slide');
  if(iframeSlides.length !== state.slideEls.length) return;
  const iSlide = iframeSlides[idx];
  if(!iSlide) return;
  // Strip editor-only attributes before importing
  const cleanClone = iSlide.cloneNode(true);
  cleanClone.querySelectorAll('[data-edit-hover]').forEach(n => n.removeAttribute('data-edit-hover'));
  cleanClone.querySelectorAll('[data-edit-selected]').forEach(n => n.removeAttribute('data-edit-selected'));
  cleanClone.removeAttribute('data-edit-hover');
  cleanClone.removeAttribute('data-edit-selected');
  cleanClone.classList.remove('active','ai','ao','air','aor');
  cleanClone.style.display = '';
  // Replace the slide in state.doc with imported clone (cross-doc safe)
  const imported = state.doc.importNode(cleanClone, true);
  docSlide.parentNode.replaceChild(imported, docSlide);
  // refresh slideEls reference array
  state.slideEls = Array.from(state.doc.querySelectorAll('.slide'));
}

function deleteSlide(i){
  if(state.slideEls.length <= 1){ alert('최소 1장 이상 유지되어야 합니다.'); return; }
  if(!confirm(`슬라이드 ${i+1}을(를) 삭제하시겠습니까?`)) return;
  // 구조 변경 전에 현재 iframe 편집을 state.doc로 반영 (slideEls 길이가 바뀌면 sync가 스킵됨)
  syncIframeToDoc();
  state.slideEls[i].remove();
  state.slideEls = Array.from(state.doc.querySelectorAll('.slide'));
  if(state.curSlide >= state.slideEls.length) state.curSlide = state.slideEls.length-1;
  snapshot();
  renderFrame();
  renderSlideList();
}

function addSlide(){
  syncIframeToDoc();
  const idx = state.slideEls.length;
  const s = state.doc.createElement('div');
  s.className = 'slide';
  s.id = 's' + idx;
  s.innerHTML = `<div class="si"><div class="sh">새 슬라이드</div><div class="sd">내용을 입력하세요.</div></div>`;
  // append to scale-wrap or body
  const host = state.doc.getElementById('scale-wrap') || state.doc.body;
  host.appendChild(s);
  state.slideEls = Array.from(state.doc.querySelectorAll('.slide'));
  state.curSlide = state.slideEls.length-1;
  snapshot();
  renderFrame();
  renderSlideList();
}

function duplicateSlide(){
  syncIframeToDoc();
  const cur = state.slideEls[state.curSlide];
  const cp = cur.cloneNode(true);
  cp.id = 's' + Date.now();
  cur.parentNode.insertBefore(cp, cur.nextSibling);
  state.slideEls = Array.from(state.doc.querySelectorAll('.slide'));
  state.curSlide += 1;
  snapshot();
  renderFrame();
  renderSlideList();
}

// ============ Selection ============
function selectElement(el){
  // clear previous mark
  const fdoc = $('frame').contentDocument;
  if(fdoc) fdoc.querySelectorAll('[data-edit-selected]').forEach(n => n.removeAttribute('data-edit-selected'));
  state.selected = el;
  if(el) el.setAttribute('data-edit-selected','');
  renderProps();
  renderHandles();
}

function clearSelection(){ selectElement(null); }

// ============ Move/Resize ============
// Convert element to absolute positioning (relative to nearest positioned ancestor — usually .slide)
function makeAbsolute(el){
  const slide = getSlideRoot(el);
  if(!slide) return;
  const elRect = el.getBoundingClientRect();
  const w = elRect.width;
  const h = elRect.height;

  const target = el.offsetParent || slide;
  const targetRect = target.getBoundingClientRect();
  const newLeft = elRect.left - targetRect.left;
  const newTop  = elRect.top  - targetRect.top;

  // paint 순서 보존: 이 요소가 뒤쪽 정적/relative 형제를 시각적으로 "감싸는" 프레임이면
  // (later sibling의 rect가 el rect 안에 들어가면) absolute 전환 후에도 뒤에 남아야 함 → z-index:-1
  // 단순히 옆에 나란히 있는 작은 요소(체크 표시 등)는 영향 없음.
  const win = el.ownerDocument.defaultView;
  const elIdx = Array.from(el.parentNode.children).indexOf(el);
  const isWrappingFrame = Array.from(el.parentNode.children).slice(elIdx+1).some(s => {
    if(s.hasAttribute && s.hasAttribute('data-edit-spacer')) return false;
    const p = win.getComputedStyle(s).position;
    if(p !== 'static' && p !== 'relative') return false;
    const sr = s.getBoundingClientRect();
    return sr.left >= elRect.left && sr.right <= elRect.right
        && sr.top  >= elRect.top  && sr.bottom <= elRect.bottom;
  });

  // 형제 요소가 빈 자리로 밀려오지 않도록 같은 크기의 spacer를 원래 자리에 삽입
  // (flex/grid 부모도 동일하게 동작 — 자리 점유만 하고 시각적으로는 보이지 않음)
  if(!el.previousElementSibling || !el.previousElementSibling.hasAttribute('data-edit-spacer')){
    const doc = el.ownerDocument;
    const cs = doc.defaultView.getComputedStyle(el);
    const spacer = doc.createElement('div');
    spacer.setAttribute('data-edit-spacer','');
    spacer.style.width = w + 'px';
    spacer.style.height = h + 'px';
    spacer.style.margin = cs.margin;
    if(cs.flex && cs.flex !== '0 1 auto') spacer.style.flex = cs.flex;
    if(cs.gridColumn && cs.gridColumn !== 'auto') spacer.style.gridColumn = cs.gridColumn;
    if(cs.gridRow && cs.gridRow !== 'auto') spacer.style.gridRow = cs.gridRow;
    if(cs.alignSelf && cs.alignSelf !== 'auto') spacer.style.alignSelf = cs.alignSelf;
    spacer.style.visibility = 'hidden';
    spacer.style.pointerEvents = 'none';
    el.parentNode.insertBefore(spacer, el);
  }

  el.style.boxSizing = 'border-box';
  el.style.position = 'absolute';
  el.style.margin = '0';
  el.style.left = newLeft + 'px';
  el.style.top  = newTop + 'px';
  el.style.width = w + 'px';
  el.style.height = h + 'px';
  if(isWrappingFrame && !el.style.zIndex){
    el.style.zIndex = '-1';
  }
}

function startDragMove(e){
  const el = state.selected; if(!el) return;
  if(el.classList && el.classList.contains('slide')) return; // don't drag the whole slide
  // 임계값(4px) 넘게 움직였을 때만 makeAbsolute 호출 — 단순 클릭에서 절대위치 전환되는 것 방지
  const DRAG_THRESHOLD = 4;
  const startX = e.clientX, startY = e.clientY;
  let startL = 0, startT = 0, dragOriginX = 0, dragOriginY = 0, dragging = false;
  const fdoc = $('frame').contentDocument;
  const beginDrag = (ev) => {
    if(el.style.position !== 'absolute') makeAbsolute(el);
    startL = parseFloat(el.style.left)||0;
    startT = parseFloat(el.style.top)||0;
    // 임계값을 넘은 시점의 마우스 좌표를 새 기준으로 — threshold 만큼의 점프 방지
    dragOriginX = ev.clientX;
    dragOriginY = ev.clientY;
    dragging = true;
  };
  const onMove = ev => {
    if(!dragging){
      const dx0 = ev.clientX - startX, dy0 = ev.clientY - startY;
      if(Math.abs(dx0) < DRAG_THRESHOLD && Math.abs(dy0) < DRAG_THRESHOLD) return;
      beginDrag(ev);
      return;
    }
    // 캔버스가 transform: scale(s)로 축소돼 있을 수 있으므로 마우스 delta(parent 화면 px)를
    // 1/s로 나눠 iframe 좌표계의 px로 변환한다 — resize와 동일한 보정.
    const scale = getScale() || 1;
    const dx = (ev.clientX - dragOriginX) / scale;
    const dy = (ev.clientY - dragOriginY) / scale;
    el.style.left = (startL + dx) + 'px';
    el.style.top  = (startT + dy) + 'px';
    renderHandles();
    syncPropFields();
  };
  const onUp = () => {
    fdoc.removeEventListener('mousemove', onMove, true);
    fdoc.removeEventListener('mouseup', onUp, true);
    document.removeEventListener('mousemove', onMove, true);
    document.removeEventListener('mouseup', onUp, true);
    if(dragging) snapshot();
  };
  fdoc.addEventListener('mousemove', onMove, true);
  fdoc.addEventListener('mouseup', onUp, true);
  document.addEventListener('mousemove', onMove, true);
  document.addEventListener('mouseup', onUp, true);
}

function startResize(dir, e){
  e.preventDefault(); e.stopPropagation();
  const el = state.selected; if(!el) return;
  if(el.style.position !== 'absolute') makeAbsolute(el);
  const startX = e.clientX, startY = e.clientY;
  const startL = parseFloat(el.style.left)||0;
  const startT = parseFloat(el.style.top)||0;
  const startW = parseFloat(el.style.width)||el.offsetWidth;
  const startH = parseFloat(el.style.height)||el.offsetHeight;
  const scale = getScale();
  const onMove = ev => {
    const dx = (ev.clientX - startX)/scale, dy = (ev.clientY - startY)/scale;
    let l=startL,t=startT,w=startW,h=startH;
    if(dir.includes('e')) w = Math.max(20, startW+dx);
    if(dir.includes('s')) h = Math.max(20, startH+dy);
    if(dir.includes('w')){ w = Math.max(20, startW-dx); l = startL+(startW-w); }
    if(dir.includes('n')){ h = Math.max(20, startH-dy); t = startT+(startH-h); }
    el.style.left=l+'px'; el.style.top=t+'px'; el.style.width=w+'px'; el.style.height=h+'px';
    renderHandles();
    syncPropFields();
  };
  const onUp = () => {
    document.removeEventListener('mousemove', onMove, true);
    document.removeEventListener('mouseup', onUp, true);
    snapshot();
  };
  document.addEventListener('mousemove', onMove, true);
  document.addEventListener('mouseup', onUp, true);
}

// ============ Handles (rendered in parent doc, over iframe) ============
function getScale(){
  const f = $('frame'); const r = f.getBoundingClientRect();
  return r.width / 1280;
}
function renderHandles(){
  const ov = $('overlay'); ov.innerHTML = '';
  const el = state.selected; if(!el) return;
  const slide = getSlideRoot(el); if(!slide) return;
  const fdoc = $('frame').contentDocument; if(!fdoc) return;
  const elRect = el.getBoundingClientRect();
  // overlay와 iframe은 모두 canvas-wrap (0,0)에 정렬되고 같은 1280x800 크기이므로
  // iframe 내부 viewport 좌표(getBoundingClientRect)를 그대로 overlay 좌표로 쓰면 정확히 겹친다.
  // 이전엔 슬라이드 기준 좌표로 계산해 body 마진/슬라이드 오프셋만큼 어긋났음.
  const left = elRect.left;
  const top  = elRect.top;
  const w = elRect.width, h = elRect.height;

  const box = document.createElement('div');
  box.className = 'sel-box';
  box.style.left = left+'px'; box.style.top = top+'px';
  box.style.width = w+'px'; box.style.height = h+'px';
  ov.appendChild(box);

  const dirs = [
    ['nw',0,0],['n',w/2,0],['ne',w,0],
    ['w',0,h/2],['e',w,h/2],
    ['sw',0,h],['s',w/2,h],['se',w,h]
  ];
  dirs.forEach(([d,x,y])=>{
    const hd = document.createElement('div');
    hd.className = 'handle h-'+d;
    hd.style.left = (left+x-5)+'px';
    hd.style.top  = (top+y-5)+'px';
    hd.addEventListener('mousedown', ev=>startResize(d,ev));
    ov.appendChild(hd);
  });
}

function fitCanvas(){
  const c = $('center');
  const wrap = $('canvas-wrap');
  const pad = 40;
  const sx = (c.clientWidth - pad)/1280;
  const sy = (c.clientHeight - pad)/800;
  const s = Math.min(1, Math.min(sx, sy));
  wrap.style.transform = `scale(${s})`;
  wrap.style.transformOrigin = 'center center';
  renderHandles();
}
window.addEventListener('resize', fitCanvas);

// ============ Properties Panel ============
function renderProps(){
  const p = $('props');
  const el = state.selected;
  if(!el){
    p.innerHTML = `<div id="empty-msg">선택된 요소가 없습니다.<br><br>가운데 슬라이드의 아무 요소나<br>클릭하여 편집을 시작하세요.</div>`;
    return;
  }

  const tag = el.tagName.toLowerCase();
  const cls = el.className || '';
  const cs = el.ownerDocument.defaultView.getComputedStyle(el);
  const isAbs = el.style.position === 'absolute';
  const left = parseFloat(el.style.left)||0;
  const top  = parseFloat(el.style.top)||0;
  const w = parseFloat(el.style.width) || el.offsetWidth;
  const h = parseFloat(el.style.height)|| el.offsetHeight;

  const fontSize = parseFloat(cs.fontSize)||14;
  const color = rgbToHex(cs.color);
  const bgIsTransparent = isTransparentColor(cs.backgroundColor);
  const bg = bgIsTransparent ? '#000000' : rgbToHex(cs.backgroundColor);
  const fontWeight = cs.fontWeight;
  const textAlign = cs.textAlign;
  const lineHeightRaw = cs.lineHeight;
  // line-height can be 'normal' or 'Npx'. Normalize to unitless ratio for the input.
  const lineHeight = (lineHeightRaw==='normal')
    ? (1.4)
    : (parseFloat(lineHeightRaw)/fontSize || 1.4);
  const letterSpacingRaw = cs.letterSpacing;
  const letterSpacing = (letterSpacingRaw==='normal') ? 0 : (parseFloat(letterSpacingRaw)||0);
  const isCodeLike = (tag==='code' || tag==='pre' || el.querySelector('code,pre'));

  // 텍스트 편집: 자식이 없거나 <br>만 있으면 plain 모드, 그 외에는 HTML(태그 포함) 모드
  const isPlainText = (el.children.length === 0) ||
    Array.from(el.children).every(c => c.tagName === 'BR');
  const hasContent = el.innerHTML.trim().length > 0 || el.textContent.trim().length > 0;
  // 슬라이드 자체는 편집 패널 안 보임. 내용 있으면 항상 편집 가능
  const isLeaf = !el.classList.contains('slide') && hasContent;
  // textarea 표시: <br>만 \n으로 보여주고, 소스 들여쓰기 공백/개행은 단일 공백으로 축약
  // (브라우저가 시각적으로 축약하는 것과 동일하게 만들어 round-trip 시 들여쓰기가 <br>로 변하는 것 방지)
  const text = isLeaf
    ? el.innerHTML.replace(/<br\s*\/?>/gi, '').replace(/\s+/g, ' ').replace(//g, '\n').trim()
    : '';
  const textHint = isPlainText
    ? '줄바꿈은 Enter로 입력'
    : '<span style="color:#f5a623">태그 포함 — Enter는 줄바꿈(&lt;br&gt;), 태그는 그대로 입력하세요</span>';

  p.innerHTML = `
    <div id="crumbs">${buildCrumbs(el)}</div>
    <div class="ph">요소</div>
    <div class="row">
      <div class="field"><label>tag</label><input value="${escapeHTML(tag)}" disabled></div>
      <div class="field"><label>class</label><input id="f-class" value="${escapeHTML(cls)}"></div>
    </div>
    <div class="ph">위치 & 크기 ${isAbs?'':'<span style="color:#f5a623">(클릭/드래그시 절대위치 전환)</span>'} <span style="color:#888;font-weight:400">· 방향 버튼: 1px (Shift +10)</span></div>
    <div class="row">
      <div class="field"><label>X</label><input id="f-x" type="number" value="${left.toFixed(0)}"></div>
      <div class="field"><label>Y</label><input id="f-y" type="number" value="${top.toFixed(0)}"></div>
    </div>
    <div class="row-nudge">
      <button class="nudge" data-axis="x" data-dir="-1" title="왼쪽 1px (Shift: 10)">◀</button>
      <button class="nudge" data-axis="x" data-dir="1"  title="오른쪽 1px (Shift: 10)">▶</button>
      <button class="nudge" data-axis="y" data-dir="-1" title="위 1px (Shift: 10)">▲</button>
      <button class="nudge" data-axis="y" data-dir="1"  title="아래 1px (Shift: 10)">▼</button>
    </div>
    <div class="row">
      <div class="field"><label>W</label><input id="f-w" type="number" value="${w.toFixed(0)}"></div>
      <div class="field"><label>H</label><input id="f-h" type="number" value="${h.toFixed(0)}"></div>
    </div>
    <div class="ph">스타일</div>
    <div class="row">
      <div class="field"><label>글자색</label><input id="f-color" type="color" value="${color}"></div>
      <div class="field"><label>배경색 ${bgIsTransparent?'<span style="color:#f5a623">· 현재 투명</span>':''}</label>
        <div style="display:flex;gap:4px;align-items:center;">
          <input id="f-bg" type="color" value="${bg}" style="flex:1;${bgIsTransparent?'background-image:linear-gradient(45deg,#888 25%,transparent 25%,transparent 75%,#888 75%),linear-gradient(45deg,#888 25%,transparent 25%,transparent 75%,#888 75%);background-size:8px 8px;background-position:0 0,4px 4px;':''}">
          <button class="mini-btn" id="b-bg-clear" title="배경을 투명으로">투명</button>
        </div>
      </div>
    </div>
    <div class="row3">
      <div class="field"><label>크기(px)</label><input id="f-fs" type="number" value="${fontSize.toFixed(0)}"></div>
      <div class="field"><label>굵기</label>
        <select id="f-fw">
          ${[300,400,500,600,700,800,900].map(v=>`<option value="${v}" ${parseInt(fontWeight)===v?'selected':''}>${v}</option>`).join('')}
        </select>

      <div class="field"><label>정렬</label>
        <select id="f-ta">
          ${['left','center','right','justify'].map(v=>`<option value="${v}" ${textAlign===v?'selected':''}>${v}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="ph">줄 간격 & 자간 ${isCodeLike?'<span style="color:#00d4a0">(코드 요소)</span>':''}</div>
    <div class="row-lh">
      <div class="field"><label>line-height</label><input id="f-lh" type="number" step="0.05" min="0.5" max="4" value="${lineHeight.toFixed(2)}"></div>
      <div class="field"><label>letter(px)</label><input id="f-ls" type="number" step="0.1" value="${letterSpacing.toFixed(1)}"></div>
      <div class="field"><label title="line-height/letter-spacing 값을 어디까지 적용할지 결정합니다. 자식 요소가 부모 스타일을 덮어쓰고 있으면 '선택 요소만'으로는 변화가 보이지 않을 수 있어, 하위 요소까지 강제로 덮어써야 할 때 사용합니다.">적용 범위 <span style="color:#888;cursor:help">ⓘ</span></label>
        <select id="f-lh-scope" title="값을 적용할 대상 범위를 선택합니다.">
          <option value="self" title="선택한 요소 자체에만 style을 적용합니다. 하위 요소가 자체 line-height/letter-spacing을 가지고 있으면 그 값이 우선합니다(상속만 됨).">선택 요소만</option>
          <option value="code" ${isCodeLike?'selected':''} title="선택 요소 + 그 안의 모든 &lt;code&gt;, &lt;pre&gt; 태그에 직접 style을 적용합니다. 코드 블록만 줄간격/자간을 일괄 조정할 때 유용합니다.">하위 code/pre</option>
          <option value="all" title="선택 요소 + 모든 자손(*) 요소에 직접 style을 적용해 강제로 덮어씁니다. 자식들이 각자 다른 값을 가지고 있어도 통일됩니다(가장 강력).">하위 전체</option>
        </select>
      </div>
    </div>
    ${isLeaf?`<div class="ph">텍스트 <span style="color:#888;font-weight:400">${textHint}</span></div>
    <div class="row-btns" style="margin:0 0 4px"><button class="mini-btn" id="b-nbsp" title="커서 위치에 &amp;nbsp; 삽입 (HTML 모드에서 공백 보존)">+ &amp;nbsp;</button></div>
    <div class="field"><textarea id="f-text" rows="4">${escapeHTML(text)}</textarea></div>`:''}
    <div class="ph">고급</div>
    <div class="field"><label>style 직접 편집</label><textarea id="f-style" rows="3">${escapeHTML(el.getAttribute('style')||'')}</textarea></div>
    <div class="row-btns">
      <button class="mini-btn" id="b-front">맨앞</button>
      <button class="mini-btn" id="b-back">맨뒤</button>
      <button class="mini-btn" id="b-dup">복제</button>
      <button class="mini-btn" id="b-parent">부모선택</button>
      <button class="mini-btn danger" id="b-del">삭제</button>
    </div>
  `;

  // wire fields
  const bind = (id, fn) => { const e=$(id); if(e) e.addEventListener('input', fn); };
  bind('f-class', e => { el.className = e.target.value; renderHandles(); });
  bind('f-x', e => { ensureAbs(el); el.style.left = e.target.value+'px'; renderHandles(); });
  bind('f-y', e => { ensureAbs(el); el.style.top  = e.target.value+'px'; renderHandles(); });
  // 방향 버튼: 현재 위치 기준 nudge (Shift = 10px)
  p.querySelectorAll('.nudge').forEach(btn => {
    btn.addEventListener('click', ev => {
      ensureAbs(el);
      const step = ev.shiftKey ? 10 : 1;
      const dir = parseInt(btn.dataset.dir);
      const axis = btn.dataset.axis;
      if(axis === 'x'){
        el.style.left = ((parseFloat(el.style.left)||0) + dir*step) + 'px';
      } else {
        el.style.top  = ((parseFloat(el.style.top) ||0) + dir*step) + 'px';
      }
      renderHandles(); syncPropFields(); snapshot();
    });
  });
  bind('f-w', e => { ensureAbs(el); el.style.width = e.target.value+'px'; renderHandles(); });
  bind('f-h', e => { ensureAbs(el); el.style.height = e.target.value+'px'; renderHandles(); });
  bind('f-color', e => { el.style.color = e.target.value; });
  bind('f-bg', e => { el.style.background = e.target.value; });
  const bgClearBtn = $('b-bg-clear');
  if(bgClearBtn) bgClearBtn.onclick = () => {
    el.style.background = 'transparent';
    snapshot();
    renderProps();
  };
  bind('f-fs', e => { el.style.fontSize = e.target.value+'px'; renderHandles(); });
  bind('f-fw', e => { el.style.fontWeight = e.target.value; });
  bind('f-ta', e => { el.style.textAlign = e.target.value; });
  const applyToScope = (prop, val) => {
    const scope = $('f-lh-scope')?.value || 'self';
    if(scope==='self'){ el.style[prop] = val; }
    else if(scope==='code'){
      el.style[prop] = val;
      el.querySelectorAll('code, pre').forEach(n => n.style[prop] = val);
    } else {
      el.style[prop] = val;
      el.querySelectorAll('*').forEach(n => n.style[prop] = val);
    }
  };
  bind('f-lh', e => { applyToScope('lineHeight', e.target.value); renderHandles(); });
  bind('f-ls', e => { applyToScope('letterSpacing', e.target.value+'px'); renderHandles(); });
  if(isLeaf){
    const nbspBtn = $('b-nbsp');
    if(nbspBtn) nbspBtn.onclick = () => {
      const ta = $('f-text'); if(!ta) return;
      const s = ta.selectionStart, e = ta.selectionEnd;
      const v = ta.value;
      ta.value = v.slice(0,s) + '&nbsp;' + v.slice(e);
      ta.focus();
      ta.selectionStart = ta.selectionEnd = s + 6;
      ta.dispatchEvent(new Event('input', {bubbles:true}));
    };
  }
  if(isLeaf) bind('f-text', e => {
    if(isPlainText){
      // plain 모드: <, >, & escape + \n → <br>
      el.innerHTML = escapeHTML(e.target.value).replace(/\n/g, '<br>');
    } else {
      // HTML 모드: 태그는 그대로, \n만 <br>로 변환 (사용자가 <code> 등을 직접 입력)
      el.innerHTML = e.target.value.replace(/\n/g, '<br>');
    }
    renderHandles();
  });
  bind('f-style', e => { el.setAttribute('style', e.target.value); renderHandles(); });

  // commit snapshot on blur for inputs
  p.querySelectorAll('input,textarea,select').forEach(inp => {
    inp.addEventListener('change', snapshot);
  });

  $('b-front').onclick = () => { el.parentNode.appendChild(el); snapshot(); renderHandles(); };
  $('b-back').onclick  = () => { el.parentNode.insertBefore(el, el.parentNode.firstChild); snapshot(); renderHandles(); };
  $('b-dup').onclick   = () => duplicateSelected();
  $('b-parent').onclick= () => { if(el.parentElement && !el.parentElement.classList.contains('slide')) selectElement(el.parentElement); else if(el.parentElement) selectElement(el.parentElement); };
  $('b-del').onclick   = () => deleteSelected();

  // breadcrumb clicks
  p.querySelectorAll('#crumbs span[data-i]').forEach(c => {
    c.onclick = () => {
      const path = c.getAttribute('data-path').split('>').filter(Boolean);
      let n = getSlideRoot(el);
      for(const idx of path){ if(!n) break; n = n.children[parseInt(idx)]; }
      if(n) selectElement(n);
    };
  });
}

function syncPropFields(){
  const el = state.selected; if(!el) return;
  const set = (id,v) => { const e=$(id); if(e && document.activeElement!==e) e.value = v; };
  set('f-x', (parseFloat(el.style.left)||0).toFixed(0));
  set('f-y', (parseFloat(el.style.top)||0).toFixed(0));
  set('f-w', (parseFloat(el.style.width)||el.offsetWidth).toFixed(0));
  set('f-h', (parseFloat(el.style.height)||el.offsetHeight).toFixed(0));
  set('f-style', el.getAttribute('style')||'');
}

function ensureAbs(el){ if(el.style.position !== 'absolute') makeAbsolute(el); }

function buildCrumbs(el){
  const slide = getSlideRoot(el);
  const path = [];
  let n = el;
  while(n && n !== slide){
    path.unshift(n);
    n = n.parentElement;
  }
  const parts = ['<span data-path="" data-i="r">slide</span>'];
  let acc = '';
  path.forEach((node, idx) => {
    const i = Array.from(node.parentElement.children).indexOf(node);
    acc += i + '>';
    parts.push(`<span data-path="${acc}" data-i="${idx}">${node.tagName.toLowerCase()}${node.className?'.'+node.className.split(' ')[0]:''}</span>`);
  });
  return parts.join(' › ');
}

function rgbToHex(rgb){
  if(!rgb) return '#000000';
  const m = rgb.match(/[\d.]+/g); if(!m || m.length<3) return '#000000';
  return '#' + m.slice(0,3).map(x=>parseInt(x).toString(16).padStart(2,'0')).join('');
}
function isTransparentColor(rgb){
  if(!rgb || rgb==='transparent') return true;
  const m = rgb.match(/rgba?\(([^)]+)\)/i);
  if(!m) return false;
  const parts = m[1].split(',').map(s=>parseFloat(s.trim()));
  if(parts.length>=4 && parts[3]===0) return true;
  return false;
}
function escapeHTML(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ============ Inline text edit ============
function startInlineEdit(el, clickEvent){
  if(!el) return;
  // .slide 자체는 편집 불가
  if(el.classList && el.classList.contains('slide')) return;

  selectElement(el);
  const originalHTML = el.innerHTML;            // ESC 취소용
  const prevOutline = el.style.outline;
  const prevBg = el.style.background;

  el.contentEditable = 'true';
  el.style.outline = '2px dashed #00d4a0';
  el.style.outlineOffset = '2px';
  el.focus();

  // 더블클릭 위치에 커서 두기 (전체 선택 대신)
  const fdoc = el.ownerDocument;
  const sel = fdoc.getSelection();
  sel.removeAllRanges();
  let placed = false;
  if(clickEvent && fdoc.caretRangeFromPoint){
    const r = fdoc.caretRangeFromPoint(clickEvent.clientX, clickEvent.clientY);
    if(r){ sel.addRange(r); placed = true; }
  }
  if(!placed){
    const r = fdoc.createRange();
    r.selectNodeContents(el);
    r.collapse(false);   // 끝으로
    sel.addRange(r);
  }

  let cancelled = false;
  const onKey = (ev) => {
    if(ev.key === 'Enter' && !ev.shiftKey){
      ev.preventDefault();
      fdoc.execCommand('insertLineBreak');
    } else if(ev.key === 'Escape'){
      ev.preventDefault();
      cancelled = true;
      el.innerHTML = originalHTML;
      el.blur();
    } else if(ev.key === 'Tab'){
      ev.preventDefault();
      fdoc.execCommand('insertText', false, '  ');
    }
  };
  el.addEventListener('keydown', onKey);

  const stop = () => {
    el.contentEditable = 'false';
    el.style.outline = prevOutline;
    el.style.background = prevBg;
    el.removeEventListener('blur', stop);
    el.removeEventListener('keydown', onKey);
    if(!cancelled) snapshot();
    renderProps();
  };
  el.addEventListener('blur', stop);
}

// ============ Delete / Duplicate ============
function deleteSelected(){
  const el = state.selected; if(!el) return;
  if(el.classList && el.classList.contains('slide')) return;
  el.remove();
  state.selected = null;
  snapshot();
  renderProps();
  renderHandles();
}
function duplicateSelected(){
  const el = state.selected; if(!el) return;
  if(el.classList && el.classList.contains('slide')) return;
  const cp = el.cloneNode(true);
  if(el.style.position === 'absolute'){
    cp.style.left = (parseFloat(el.style.left)+20)+'px';
    cp.style.top  = (parseFloat(el.style.top)+20)+'px';
  }
  el.parentNode.insertBefore(cp, el.nextSibling);
  selectElement(cp);
  snapshot();
}

// 요소 클립보드 (메모리)
function copySelected(){
  const el = state.selected; if(!el) return;
  if(el.classList && el.classList.contains('slide')) return;
  state.clipboardHTML = el.outerHTML;
  showStatus('복사됨');
}
function pasteClipboard(){
  if(!state.clipboardHTML) return;
  const fdoc = $('frame').contentDocument; if(!fdoc) return;
  // 붙여넣기 위치: 선택된 요소의 부모 또는 현재 슬라이드 루트
  let host = state.selected && state.selected.parentNode;
  if(!host || (state.selected && state.selected.classList && state.selected.classList.contains('slide'))) host = state.selected;
  if(!host) host = fdoc.querySelectorAll('.slide')[state.curSlide];
  if(!host) return;
  // outerHTML을 파싱
  const tpl = fdoc.createElement('template');
  tpl.innerHTML = state.clipboardHTML;
  const newEl = tpl.content.firstElementChild;
  if(!newEl) return;
  // 절대 위치라면 +20px 오프셋
  if(newEl.style && newEl.style.position === 'absolute'){
    newEl.style.left = ((parseFloat(newEl.style.left)||0)+20)+'px';
    newEl.style.top  = ((parseFloat(newEl.style.top) ||0)+20)+'px';
  }
  // 편집자 마킹 속성 제거
  newEl.removeAttribute('data-edit-hover');
  newEl.removeAttribute('data-edit-selected');
  host.appendChild(newEl);
  selectElement(newEl);
  snapshot();
  showStatus('붙여넣기 완료');
}

// ============ Keyboard ============
function handleKeydown(e){
  // ignore if typing in inputs
  const t = e.target;
  const inField = (t && (t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable));
  if(inField) return;

  // Alt 단독 keydown은 브라우저 메뉴로 포커스를 옮기므로, 선택된 박스가 있을 때 막는다
  if(e.key==='Alt' || e.code==='AltLeft' || e.code==='AltRight'){
    state.altDown = true;
    if(state.selected){ e.preventDefault(); return; }
  }

  if(e.key==='Escape'){ clearSelection(); return; }
  if(e.key==='Delete' || e.key==='Backspace'){ deleteSelected(); e.preventDefault(); return; }
  if((e.ctrlKey||e.metaKey) && e.key==='d'){ duplicateSelected(); e.preventDefault(); return; }
  if((e.ctrlKey||e.metaKey) && e.key==='z'){ undo(); e.preventDefault(); return; }
  if((e.ctrlKey||e.metaKey) && (e.key==='y' || (e.shiftKey && e.key==='Z'))){ redo(); e.preventDefault(); return; }
  if((e.ctrlKey||e.metaKey) && e.key==='s'){ exportHTML(); e.preventDefault(); return; }
  if((e.ctrlKey||e.metaKey) && e.key==='c'){ copySelected(); e.preventDefault(); return; }
  if((e.ctrlKey||e.metaKey) && e.key==='v'){ pasteClipboard(); e.preventDefault(); return; }
  if((e.ctrlKey||e.metaKey) && e.key==='x'){ copySelected(); deleteSelected(); e.preventDefault(); return; }

  // arrow nudging (이동) / Alt+arrow (크기 변경, top-left 고정)
  const el = state.selected;
  if(el && ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)){
    if(el.classList && el.classList.contains('slide')) return;
    ensureAbs(el);
    const step = e.shiftKey ? 10 : 1;
    const altHeld = e.altKey || (e.getModifierState && e.getModifierState('Alt')) || state.altDown;
    if(altHeld){
      let w = parseFloat(el.style.width)  || el.offsetWidth;
      let h = parseFloat(el.style.height) || el.offsetHeight;
      if(e.key==='ArrowLeft')  w = Math.max(1, w - step);
      if(e.key==='ArrowRight') w = w + step;
      if(e.key==='ArrowUp')    h = Math.max(1, h - step);
      if(e.key==='ArrowDown')  h = h + step;
      el.style.width  = w + 'px';
      el.style.height = h + 'px';
    } else {
      if(e.key==='ArrowLeft')  el.style.left = (parseFloat(el.style.left)-step)+'px';
      if(e.key==='ArrowRight') el.style.left = (parseFloat(el.style.left)+step)+'px';
      if(e.key==='ArrowUp')    el.style.top  = (parseFloat(el.style.top)-step)+'px';
      if(e.key==='ArrowDown')  el.style.top  = (parseFloat(el.style.top)+step)+'px';
    }
    renderHandles(); syncPropFields();
    e.preventDefault();
  }
}
function handleAltKeyup(e){
  // Chrome은 Alt keyup 시점에 메뉴바를 활성화하므로, 선택된 박스가 있으면 막는다
  if(e.key==='Alt' || e.code==='AltLeft' || e.code==='AltRight'){
    state.altDown = false;
    if(state.selected) e.preventDefault();
  }
}
document.addEventListener('keydown', handleKeydown);
document.addEventListener('keyup', handleAltKeyup);

// ============ Export ============
function serializeDoc(){
  if(!state.doc) return '';
  // ensure all slides displayed normally on export (let original CSS rules govern via .active class)
  const out = state.doc.cloneNode(true);
  out.querySelectorAll('.slide').forEach(s => {
    s.style.display = '';
    s.classList.remove('ai','ao','air','aor','active');
  });
  // re-add original navigation script
  const nav = out.createElement('script');
  nav.textContent = buildNavScript(state.slideEls.length);
  out.body.appendChild(nav);
  // mark first slide active
  const first = out.querySelector('.slide');
  if(first) first.classList.add('active');
  return '<!DOCTYPE html>\n' + out.documentElement.outerHTML;
}

function buildNavScript(total){
  return `
const TOTAL=${total};let cur=0,anim=false;
const dn=document.getElementById('dn');
if(dn){for(let i=0;i<TOTAL;i++){const d=document.createElement('div');d.className='dot'+(i===0?' on':'');d.onclick=()=>go(i);dn.appendChild(d);}}
const slides=document.querySelectorAll('.slide');
slides.forEach((s,i)=>{ if(!s.id) s.id='s'+i; });
const gs=i=>slides[i],gd=i=>dn?dn.children[i]:null;
function go(nx,dir){if(anim||nx===cur||nx<0||nx>=TOTAL)return;anim=true;const fwd=(dir!==undefined)?dir>0:nx>cur;const oe=gs(cur),ie=gs(nx);oe.style.display='flex';oe.classList.remove('ai','ao','air','aor');oe.classList.add(fwd?'ao':'aor');ie.style.display='flex';ie.classList.remove('ai','ao','air','aor');ie.classList.add(fwd?'ai':'air');if(gd(cur))gd(cur).classList.remove('on');if(gd(nx))gd(nx).classList.add('on');cur=nx;upd();setTimeout(()=>{slides.forEach((s,i)=>{s.classList.remove('ai','ao','air','aor');if(i!==cur)s.style.display='none';});gs(cur).classList.add('active');anim=false;},400);}
function next(){go(cur+1,1);}function prev(){go(cur-1,-1);}
function upd(){const bp=document.getElementById('bp'),bn=document.getElementById('bn'),sc=document.getElementById('sc');if(bp)bp.disabled=cur===0;if(bn)bn.disabled=cur===TOTAL-1;if(sc)sc.textContent=(cur+1)+' / '+TOTAL;}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')next();if(e.key==='ArrowLeft'||e.key==='ArrowUp')prev();});
function rescale(){const vw=window.innerWidth,vh=window.innerHeight-48;const scale=Math.min(vw/1280,vh/800);const w=document.getElementById('scale-wrap');if(w){w.style.transform='scale('+scale+')';w.style.marginTop=Math.max(0,(vh-800*scale)/2)+'px';}}
window.addEventListener('resize',rescale);rescale();upd();
slides.forEach((s,i)=>{s.style.display=(i===0)?'flex':'none';});
slides[0].classList.add('active');
window.next=next;window.prev=prev;window.go=go;
`;
}

function exportHTML(){
  if(!state.doc){ alert('먼저 파일을 불러오세요.'); return; }
  // sync any iframe edits back to state.doc before serializing
  syncIframeToDoc();
  const html = serializeDoc();
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  const stamp = `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
  const base = (state.fileName || 'edited.html').replace(/\.html?$/i,'').replace(/_\d{8}_\d{6}$/,'');
  const ext = (state.fileName && /\.htm$/i.test(state.fileName)) ? '.htm' : '.html';
  const downloadName = `${base}_${stamp}${ext}`;
  a.href = url; a.download = downloadName;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  state.savedHistoryIdx = state.historyIdx;
  clearAutosave();
  showStatus('내보내기 완료: ' + downloadName);
}

window.addEventListener('beforeunload', e => {
  if(!isDirty()) return;
  e.preventDefault();
  e.returnValue = '';
  return '';
});

// ============ Wire UI ============
$('btn-open').onclick = () => $('file-input').click();
$('file-input').onchange = e => { if(e.target.files[0]) loadFromFile(e.target.files[0]); e.target.value=''; };
$('btn-save').onclick = exportHTML;
$('btn-undo').onclick = undo;
$('btn-redo').onclick = redo;
$('btn-add-slide').onclick = addSlide;
$('btn-dup-slide').onclick = duplicateSlide;

// 파일명 클릭 → 편집
$('current-file').onclick = () => {
  const span = $('current-file');
  const cur = state.fileName || 'edited.html';
  const newName = prompt('파일명을 입력하세요 (.html 자동 추가):', cur);
  if(newName == null) return;
  let v = newName.trim();
  if(!v) return;
  if(!/\.html?$/i.test(v)) v += '.html';
  state.fileName = v;
  span.textContent = '현재: ' + v;
  showStatus('파일명 변경: ' + v);
};

// Auto-load default on start
window.addEventListener('load', loadDefault);
updateHistoryButtons();
</script>
